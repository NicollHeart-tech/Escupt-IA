<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Escupt IA</title>
    
    <link rel="icon" type="image/png" href="logoroxa.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-main: #2a004f; --bg-sidebar: #4b0082; --bg-input: #3d0070;
            --text-color: #ffffff; --msg-user: #6d28d9; --msg-ai: rgba(255, 255, 255, 0.1);
        }
        [data-theme="claro"] {
            --bg-main: #ffffff; --bg-sidebar: #b3b3b3; --bg-input: #e0e0e0;
            --text-color: #000000; --msg-user: #808080; --msg-ai: #f0f0f0;
        }
        [data-theme="escuro"] {
            --bg-main: #000000; --bg-sidebar: #1a1a1a; --bg-input: #262626;
            --text-color: #ffffff; --msg-user: #333333; --msg-ai: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-color); height: 100vh; display: flex; overflow: hidden; }

        /* TELA DE CARREGAMENTO (SPLASH) */
        #splash-screen { 
            position: fixed; inset: 0; background: var(--bg-main); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10000; transition: opacity 0.8s ease; 
        }
        .loader-logo { width: 80px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        /* SIDEBAR */
        #sidebar { width: 260px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; padding: 20px; z-index: 9000; transition: 0.3s; position: fixed; left: -260px; height: 100%; }
        #sidebar.active { left: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 8500; }

        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; color: white; cursor: pointer; border-radius: 10px; margin-bottom: 5px; font-size: 0.85rem; background: rgba(255,255,255,0.05); }
        .delete-btn { opacity: 0.5; cursor: pointer; }

        /* HEADER */
        .top-bar { position: absolute; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 8000; }

        /* CONTEÚDO PRINCIPAL E CHAT CENTRALIZADO */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        
        #chatWindow { 
            flex: 1; overflow-y: auto; 
            padding: 80px 15px 120px; 
            display: none; flex-direction: column; gap: 20px; 
            align-items: center; /* Centraliza as mensagens horizontalmente */
        }

        .welcome-screen { text-align: center; margin-top: 25vh; flex: 1; }
        .welcome-screen img { width: 100px; margin-bottom: 20px; }

        /* ESTILO DOS BALÕES */
        .message { 
            width: 100%; 
            max-width: 800px; /* Limite de largura para leitura confortável */
            padding: 14px 20px; 
            border-radius: 20px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
        }
        .user-message { 
            align-self: center; 
            background-color: var(--msg-user); 
            color: white; 
            border-bottom-right-radius: 4px;
            margin-left: auto; /* Alinha à direita dentro do limite central */
        }
        .ai-message { 
            align-self: center; 
            background-color: var(--msg-ai); 
            color: var(--text-color); 
            border-bottom-left-radius: 4px;
            margin-right: auto; /* Alinha à esquerda dentro do limite central */
        }

        /* FOOTER E INPUT */
        .footer-area { position: absolute; bottom: 0; width: 100%; padding: 15px 10px 25px; display: flex; justify-content: center; z-index: 8000; background: var(--bg-main); }
        .input-wrapper { width: 100%; max-width: 800px; background-color: var(--bg-input); border-radius: 30px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; padding: 12px 0; background: transparent; border: none; color: var(--text-color); outline: none; font-size: 16px; }

        .icon-btn { cursor: pointer; opacity: 0.7; color: var(--text-color); display: flex; }
        .icon-btn.active { color: #10b981; opacity: 1; }

        /* MENUS FLUTUANTES */
        #theme-menu, #model-menu {
            position: fixed; top: 65px; right: 15px; background: var(--bg-input); 
            padding: 15px; border-radius: 15px; display: none; flex-direction: column; gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9500; min-width: 180px;
        }
        .t-btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; text-align: left; background: rgba(255,255,255,0.05); }

        @media (min-width: 1024px) {
            #sidebar { left: 0; position: relative; }
            .top-bar { display: none; }
            #configPC { display: flex !important; }
        }
    </style>
</head>
<body data-theme="roxo">

    <div id="splash-screen">
        <img src="logoroxa.png" id="splashLogo" class="loader-logo">
    </div>

    <div id="overlay" onclick="closeSidebar()"></div>

    <aside id="sidebar">
        <button onclick="startNewChat()" style="padding:12px; border-radius:12px; background:rgba(255,255,255,0.1); color:white; border:none; cursor:pointer; margin-bottom:15px; font-weight: bold;">Nova conversa +</button>
        <div id="history" style="flex: 1; overflow-y: auto;"></div>

        <div id="login-area" style="margin-top:auto; padding-top:15px; border-top:1px solid rgba(255,255,255,0.1);">
            <button class="t-btn" style="width:100%; background:white; color:#333;" onclick="handleGoogleLogin()" id="loginBtn">Login com Google</button>
            <div id="userInfo" style="display:none; align-items:center; gap:10px;">
                <img id="userPhoto" style="width:30px; border-radius:50%;">
                <span id="userName" style="font-size: 0.8rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                <span onclick="handleLogout()" style="cursor:pointer; opacity:0.5;">✕</span>
            </div>
            <p id="save-msg" style="font-size: 10px; opacity: 0.4; text-align: center; margin-top: 8px;">Login necessário para salvar histórico.</p>
        </div>
    </aside>

    <main id="main-content">
        <header class="top-bar">
            <div onclick="openSidebar()" style="font-size: 1.5rem; cursor: pointer;">☰</div>
            <div onclick="toggleMenu('model-menu')" style="cursor:pointer; font-weight:bold; font-size:0.75rem; background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:20px;">
                🤖 <span id="currentModelDisplay">EscuptIA_Oficial</span>
            </div>
            <img src="Configroxa.png" id="configIconMobile" onclick="toggleMenu('theme-menu')" style="width:24px; cursor:pointer;">
        </header>

        <div id="configPC" style="position: absolute; top: 15px; right: 15px; display: none; align-items: center; gap: 10px; z-index: 8001;">
             <div onclick="toggleMenu('model-menu')" style="cursor:pointer; font-size:0.8rem; background:rgba(255,255,255,0.1); padding:8px 15px; border-radius:20px;">
                🤖 <span id="currentModelDisplayPC">EscuptIA_Oficial</span>
            </div>
            <img src="Configroxa.png" id="configIconPC" onclick="toggleMenu('theme-menu')" style="width:24px; cursor:pointer;">
        </div>
        
        <div id="theme-menu">
            <button class="t-btn" style="background:#6d28d9;" onclick="setTheme('roxo')">Roxo</button>
            <button class="t-btn" style="background:#888;" onclick="setTheme('claro')">Claro</button>
            <button class="t-btn" style="background:#1a1a1a;" onclick="setTheme('escuro')">Preto</button>
        </div>

        <div id="model-menu">
            <button class="t-btn" onclick="setModel('EscuptIA_Oficial')">EscuptIA_Oficial</button>
            <button class="t-btn" onclick="setModel('EscuptIA_Coder')">EscuptIA_Coder</button>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
            <img src="logoroxa.png" id="mainLogo">
            <h2>Como posso ajudar?</h2>
        </div>

        <div id="chatWindow"></div>

        <div class="footer-area">
            <div class="input-wrapper">
                <label for="imgInput" class="icon-btn" id="imgLabel">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </label>
                <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="document.getElementById('imgLabel').classList.add('active')">
                <input type="text" class="input-box" id="userInput" placeholder="Escreva aqui..." autocomplete="off">
            </div>
        </div>
    </main>

    <script>
        // --- LOGICA DE CARREGAMENTO (SPLASH) ---
        function hideSplash() {
            const splash = document.getElementById('splash-screen');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }
        }
        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 3000); // Segurança caso o evento load falhe

        // --- VARIÁVEIS GLOBAIS ---
        const NGROK_URL = "https://chorographically-nonallegiance-rubye.ngrok-free.dev";
        let activeModel = "EscuptIA_Oficial";
        let chats = JSON.parse(localStorage.getItem('escupt_chats')) || [];
        let currentChatId = null;
        let currentUser = JSON.parse(localStorage.getItem('escupt_user')) || null;

        // --- LOGIN ---
        function handleGoogleLogin() {
            currentUser = { name: "Usuário Escupt", photo: "https://via.placeholder.com/30" };
            localStorage.setItem('escupt_user', JSON.stringify(currentUser));
            updateUserUI();
            renderHistory();
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('escupt_user');
            updateUserUI();
            renderHistory();
        }

        function updateUserUI() {
            document.getElementById('loginBtn').style.display = currentUser ? 'none' : 'block';
            document.getElementById('userInfo').style.display = currentUser ? 'flex' : 'none';
            document.getElementById('save-msg').style.display = currentUser ? 'none' : 'block';
            if(currentUser) {
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userPhoto').src = currentUser.photo;
            }
        }

        // --- CHAT ---
        async function sendMessage(text) {
            const imgInput = document.getElementById('imgInput');
            if (!text.trim() && imgInput.files.length === 0) return;

            let modelToSend = imgInput.files.length > 0 ? "EscuptIA_Vision" : activeModel;

            if (!currentChatId) {
                currentChatId = Date.now();
                chats.push({ id: currentChatId, title: text.substring(0, 30) || "Imagem", messages: [] });
            }

            document.getElementById('welcomeScreen').style.display = "none";
            document.getElementById('chatWindow').style.display = "flex";
            
            addMsgToUI(text, 'user-message');
            saveMsg(currentChatId, text, 'user');

            // Limpar input de imagem
            imgInput.value = "";
            document.getElementById('imgLabel').classList.remove('active');

            const aiDiv = addMsgToUI('...', 'ai-message');
            
            try {
                const response = await fetch(`${NGROK_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: modelToSend, prompt: text, stream: false })
                });
                const data = await response.json();
                aiDiv.innerHTML = "";
                await typeWriter(aiDiv, data.response);
                saveMsg(currentChatId, data.response, 'ai');
            } catch (err) { aiDiv.textContent = "Erro na conexão."; }
            
            if(currentUser) renderHistory();
        }

        function addMsgToUI(txt, cls) {
            const d = document.createElement('div');
            d.className = `message ${cls}`;
            d.innerHTML = marked.parse(txt || "");
            const cw = document.getElementById('chatWindow');
            cw.appendChild(d);
            cw.scrollTop = cw.scrollHeight;
            return d;
        }

        function typeWriter(element, text) {
            return new Promise((resolve) => {
                let i = 0;
                const interval = setInterval(() => {
                    if (i < text.length) {
                        element.innerHTML = marked.parse(text.substring(0, i + 1));
                        i++;
                        document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
                    } else { clearInterval(interval); resolve(); }
                }, 10);
            });
        }

        function saveMsg(id, text, role) {
            if (!currentUser) return; // SÓ SALVA SE LOGADO
            const c = chats.find(x => x.id === id);
            if(c) { 
                c.messages.push({ text, role }); 
                localStorage.setItem('escupt_chats', JSON.stringify(chats)); 
            }
        }

        // --- INTERFACE ---
        function renderHistory() {
            const hl = document.getElementById('history');
            hl.innerHTML = "";
            if(!currentUser) return;
            chats.slice().reverse().forEach(c => {
                const d = document.createElement('div');
                d.className = "history-item";
                if(c.id === currentChatId) d.style.background = "rgba(255,255,255,0.2)";
                d.innerHTML = `<span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</span><span onclick="deleteChat(${c.id}, event)">🗑️</span>`;
                d.onclick = () => { loadChat(c.id); if(window.innerWidth < 1024) closeSidebar(); };
                hl.appendChild(d);
            });
        }

        function deleteChat(id, e) {
            e.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            localStorage.setItem('escupt_chats', JSON.stringify(chats));
            if(currentChatId === id) startNewChat();
            renderHistory();
        }

        function startNewChat() { 
            currentChatId = null; 
            document.getElementById('chatWindow').innerHTML = ""; 
            document.getElementById('chatWindow').style.display = "none"; 
            document.getElementById('welcomeScreen').style.display = "block"; 
            renderHistory(); 
        }

        function loadChat(id) {
            currentChatId = id; 
            const c = chats.find(x => x.id === id);
            document.getElementById('welcomeScreen').style.display = "none";
            const cw = document.getElementById('chatWindow');
            cw.style.display = "flex"; cw.innerHTML = "";
            c.messages.forEach(m => addMsgToUI(m.text, m.role === 'user' ? 'user-message' : 'ai-message'));
            renderHistory();
        }

        function setTheme(t) {
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('escupt_theme', t);
            const logo = t === 'claro' ? "logobranca.png" : (t === 'escuro' ? "logoescura.png" : "logoroxa.png");
            const conf = t === 'claro' ? "Configbranca.png" : (t === 'escuro' ? "Configescura.png" : "Configroxa.png");
            document.getElementById('mainLogo').src = logo;
            document.getElementById('splashLogo').src = logo;
            document.getElementById('configIconMobile').src = conf;
            document.getElementById('configIconPC').src = conf;
            document.getElementById('theme-menu').style.display = 'none';
        }

        function setModel(m) {
            activeModel = m;
            document.getElementById('currentModelDisplay').textContent = m;
            document.getElementById('currentModelDisplayPC').textContent = m;
            document.getElementById('model-menu').style.display = 'none';
        }

        function toggleMenu(id) {
            const m = document.getElementById(id);
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }

        document.getElementById('userInput').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter' && e.target.value.trim()) { sendMessage(e.target.value); e.target.value = ""; } 
        });

        // INIT
        updateUserUI();
        setTheme(localStorage.getItem('escupt_theme') || 'roxo');
        renderHistory();
    </script>
</body>
</html>
