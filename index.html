<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Escupt IA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-main: #2a004f; --bg-sidebar: #4b0082; --bg-input: #3d0070;
            --text-color: #ffffff; --msg-user: #6d28d9; --msg-ai: rgba(255, 255, 255, 0.1);
        }
        [data-theme="claro"] {
            --bg-main: #ffffff; --bg-sidebar: #b3b3b3; --bg-input: #e0e0e0;
            --text-color: #000000; --msg-user: #808080; --msg-ai: #f0f0f0;
        }
        [data-theme="escuro"] {
            --bg-main: #000000; --bg-sidebar: #1a1a1a; --bg-input: #262626;
            --text-color: #ffffff; --msg-user: #333333; --msg-ai: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-color); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { 
            width: 260px; background-color: var(--bg-sidebar); 
            display: flex; flex-direction: column; padding: 20px; 
            z-index: 9000; transition: 0.3s;
            position: fixed; left: -260px; height: 100%;
        }
        #sidebar.active { left: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 8500; }

        /* HEADER */
        .top-bar {
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 8000;
        }

        /* CONTEÚDO PRINCIPAL CENTRALIZADO */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; height: 100%; align-items: center; }
        
        #chatWindow { 
            width: 100%; max-width: 800px; /* Limita a largura no meio */
            flex: 1; overflow-y: auto; 
            padding: 80px 15px 120px; 
            display: none; flex-direction: column; gap: 15px; 
        }
        
        .welcome-screen { text-align: center; margin-top: 25vh; flex: 1; }
        .welcome-screen img { width: 100px; margin-bottom: 20px; }

        .message { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: var(--msg-user); color: white; border-bottom-right-radius: 4px; }
        .ai-message { align-self: flex-start; background-color: var(--msg-ai); color: var(--text-color); border-bottom-left-radius: 4px; }

        /* FOOTER */
        .footer-area { 
            position: absolute; bottom: 0; width: 100%; 
            padding: 15px 10px 25px; display: flex; justify-content: center; z-index: 8000;
        }
        .input-wrapper { 
            width: 100%; max-width: 800px; background-color: var(--bg-input); 
            border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; gap: 10px;
        }
        .input-box { flex: 1; padding: 12px 0; background: transparent; border: none; color: var(--text-color); outline: none; font-size: 16px; }
        
        .icon-btn { cursor: pointer; opacity: 0.7; color: var(--text-color); }
        .icon-btn.active { color: #10b981; opacity: 1; }

        @media (min-width: 1024px) {
            #sidebar { left: 0; position: relative; }
            .top-bar { display: none; }
        }
    </style>
</head>
<body data-theme="roxo">

    <div id="overlay" onclick="closeSidebar()"></div>

    <aside id="sidebar">
        <button onclick="startNewChat()" style="padding:12px; border-radius:12px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); cursor:pointer; margin-bottom:15px; font-weight: bold;">Nova conversa +</button>
        <div id="history" style="flex: 1; overflow-y: auto;"></div>
        
        <div id="login-area" style="margin-top:auto; padding-top:15px; border-top:1px solid rgba(255,255,255,0.1);">
            <button id="loginBtn" style="width:100%; padding:10px; border-radius:10px; border:none; background:white; font-weight:bold; cursor:pointer;">Login com Google</button>
            <div id="userInfo" style="display:none; align-items:center; gap:10px;">
                <img id="userPhoto" style="width:30px; border-radius:50%;">
                <span id="userName" style="font-size:0.8rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
                <button onclick="handleLogout()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
            </div>
            <p id="save-warning" style="font-size: 10px; opacity: 0.5; margin-top: 8px; text-align: center;">Conversas não são salvas sem login.</p>
        </div>
    </aside>

    <main id="main-content">
        <header class="top-bar">
            <div onclick="openSidebar()" style="font-size:1.8rem; cursor:pointer;">☰</div>
            <div style="font-weight:bold;">Escupt IA</div>
            <img src="Configroxa.png" onclick="toggleThemeMenu()" style="width:24px; cursor:pointer;">
        </header>

        <div class="welcome-screen" id="welcomeScreen">
            <img src="logoroxa.png" id="mainLogo">
            <h2>Como posso ajudar?</h2>
        </div>

        <div id="chatWindow"></div>

        <div class="footer-area">
            <div class="input-wrapper">
                <label for="imgInput" class="icon-btn" id="imgLabel">🖼️</label>
                <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="document.getElementById('imgLabel').classList.add('active')">
                <input type="text" class="input-box" id="userInput" placeholder="Escreva aqui..." autocomplete="off">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnaeFZVMY7M2bG177YKB5yKqdH58YdBJo",
            authDomain: "escupt-ia.firebaseapp.com",
            projectId: "escupt-ia",
            storageBucket: "escupt-ia.firebasestorage.app",
            messagingSenderId: "972278178048",
            appId: "1:972278178048:web:86c0e2f204dbd873a453e5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Elementos UI
        const loginBtn = document.getElementById('loginBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userPhoto = document.getElementById('userPhoto');
        const saveWarning = document.getElementById('save-warning');

        // Login
        loginBtn.onclick = () => signInWithPopup(auth, provider).catch(console.error);
        
        // Logout (exposto globalmente)
        window.handleLogout = () => signOut(auth);

        // Monitorar estado do login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                saveWarning.style.display = 'none';
                userName.textContent = user.displayName;
                userPhoto.src = user.photoURL;
                window.currentUser = user;
            } else {
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
                saveWarning.style.display = 'block';
                window.currentUser = null;
                document.getElementById('history').innerHTML = "";
            }
            renderHistory();
        });
    </script>

    <script>
        // Funções de Interface (Mantidas do seu index.html)
        let chats = JSON.parse(localStorage.getItem('escupt_chats')) || [];
        let currentChatId = null;

        function renderHistory() {
            const hl = document.getElementById('history');
            hl.innerHTML = "";
            if(!window.currentUser) return; // Só mostra histórico se logado

            chats.slice().reverse().forEach(c => {
                const d = document.createElement('div');
                d.style.cssText = "padding:12px; color:white; cursor:pointer; border-radius:10px; margin-bottom:5px; font-size:0.85rem; background: rgba(255,255,255,0.05);";
                d.textContent = c.title;
                d.onclick = () => loadChat(c.id);
                hl.appendChild(d);
            });
        }

        async function sendMessage(text) {
            if (!text.trim()) return;
            if (!currentChatId) {
                currentChatId = Date.now();
                chats.push({ id: currentChatId, title: text.substring(0, 30), messages: [] });
            }
            document.getElementById('welcomeScreen').style.display = "none";
            document.getElementById('chatWindow').style.display = "flex";
            
            addMsgToUI(text, 'user-message');
            
            // Só salva no localStorage se o usuário estiver logado
            if (window.currentUser) {
                const c = chats.find(x => x.id === currentChatId);
                c.messages.push({ text, role: 'user' });
                localStorage.setItem('escupt_chats', JSON.stringify(chats));
            }

            // Resposta Simulada (Integre com seu NGROK aqui)
            setTimeout(() => addMsgToUI("Olá! Como posso ajudar?", 'ai-message'), 1000);
            renderHistory();
        }

        function addMsgToUI(txt, cls) {
            const d = document.createElement('div');
            d.className = `message ${cls}`;
            d.innerHTML = marked.parse(txt);
            const cw = document.getElementById('chatWindow');
            cw.appendChild(d);
            cw.scrollTop = cw.scrollHeight;
        }

        function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }

        document.getElementById('userInput').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') { sendMessage(e.target.value); e.target.value = ""; } 
        });
    </script>
</body>
</html>
