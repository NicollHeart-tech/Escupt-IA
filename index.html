<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Escupt IA</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #2a004f; --bg-sidebar: #4b0082; --bg-input: #3d0070;
            --text-color: #ffffff; --msg-user: #6d28d9; --msg-ai: rgba(255, 255, 255, 0.1);
        }
        [data-theme="claro"] {
            --bg-main: #ffffff; --bg-sidebar: #b3b3b3; --bg-input: #e0e0e0;
            --text-color: #000000; --msg-user: #808080; --msg-ai: #f0f0f0;
        }
        [data-theme="escuro"] {
            --bg-main: #000000; --bg-sidebar: #1a1a1a; --bg-input: #262626;
            --text-color: #ffffff; --msg-user: #333333; --msg-ai: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-color); height: 100vh; display: flex; overflow: hidden; }

        #sidebar { width: 260px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; padding: 20px; z-index: 9000; transition: 0.3s; position: fixed; left: -260px; height: 100%; }
        #sidebar.active { left: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 8500; }

        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; color: white; cursor: pointer; border-radius: 10px; margin-bottom: 5px; font-size: 0.85rem; background: rgba(255,255,255,0.05); }
        .history-item:hover { background: rgba(255,255,255,0.1); }
        .delete-btn { opacity: 0.5; padding: 5px; }
        .delete-btn:hover { opacity: 1; color: #ff4d4d; }

        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; align-items: center; }
        #chatWindow { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 80px 15px 120px; display: none; flex-direction: column; gap: 15px; }
        
        .message { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: var(--msg-user); color: white; border-bottom-right-radius: 4px; }
        .ai-message { align-self: flex-start; background-color: var(--msg-ai); color: var(--text-color); border-bottom-left-radius: 4px; }

        .footer-area { position: absolute; bottom: 0; width: 100%; padding: 15px 10px 25px; display: flex; justify-content: center; z-index: 8000; }
        .input-wrapper { width: 100%; max-width: 800px; background-color: var(--bg-input); border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; padding: 12px 0; background: transparent; border: none; color: var(--text-color); outline: none; font-size: 16px; }

        #theme-menu { position: absolute; top: 60px; right: 20px; background: var(--bg-input); padding: 10px; border-radius: 10px; display: none; flex-direction: column; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 9999; }
        .theme-opt { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-color); padding: 8px; border-radius: 5px; cursor: pointer; }

        @media (min-width: 1024px) { #sidebar { left: 0; position: relative; } .mobile-btn { display: none; } }
    </style>
</head>
<body data-theme="roxo">
    <div id="overlay" onclick="closeSidebar()"></div>

    <aside id="sidebar">
        <button onclick="startNewChat()" style="padding:12px; border-radius:12px; background:rgba(255,255,255,0.1); color:white; border:none; cursor:pointer; margin-bottom:15px; font-weight: bold;">Nova conversa +</button>
        <div id="history" style="flex: 1; overflow-y: auto;"></div>
        <div id="login-area" style="margin-top:auto; padding-top:15px; border-top:1px solid rgba(255,255,255,0.1);">
            <button id="loginBtn" style="width:100%; padding:10px; border-radius:10px; border:none; background:white; font-weight:bold; cursor:pointer;">Login com Google</button>
            <div id="userInfo" style="display:none; align-items:center; gap:10px;">
                <img id="userPhoto" style="width:30px; border-radius:50%;">
                <span id="userName" style="font-size:0.8rem; flex:1; overflow:hidden; text-overflow:ellipsis;"></span>
                <button onclick="handleLogout()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
            </div>
        </div>
    </aside>

    <main id="main-content">
        <header style="position:absolute; top:0; width:100%; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; z-index:8000;">
            <div class="mobile-btn" onclick="openSidebar()" style="font-size:1.5rem; cursor:pointer;">☰</div>
            <div style="font-weight:bold; flex:1; text-align:center;">Escupt IA</div>
            <div onclick="toggleThemeMenu()" style="cursor:pointer; font-size:1.2rem;">⚙️</div>
        </header>

        <div id="theme-menu">
            <button class="theme-opt" onclick="setTheme('roxo')">Roxo</button>
            <button class="theme-opt" onclick="setTheme('claro')">Claro</button>
            <button class="theme-opt" onclick="setTheme('escuro')">Escuro</button>
        </div>

        <div class="welcome-screen" id="welcomeScreen" style="text-align:center; margin-top:30vh;">
            <h2>Como posso ajudar hoje?</h2>
        </div>

        <div id="chatWindow"></div>

        <div class="footer-area">
            <div class="input-wrapper">
                <label for="imgInput" style="cursor:pointer;">🖼️</label>
                <input type="file" id="imgInput" style="display:none;">
                <input type="text" class="input-box" id="userInput" placeholder="Mensagem Escupt IA...">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnaeFZVMY7M2bG177YKB5yKqdH58YdBJo",
            authDomain: "escupt-ia.firebaseapp.com",
            projectId: "escupt-ia",
            storageBucket: "escupt-ia.firebasestorage.app",
            messagingSenderId: "972278178048",
            appId: "1:972278178048:web:86c0e2f204dbd873a453e5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
                // Carregar chats específicos desta conta
                loadChatsFromLocal();
            } else {
                window.currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('history').innerHTML = "";
            }
            renderHistory();
        });
    </script>

    <script>
        let chats = [];
        let currentChatId = null;

        // Chave dinâmica baseada no e-mail do usuário
        function getStorageKey() {
            return window.currentUser ? `chats_${window.currentUser.email}` : null;
        }

        function loadChatsFromLocal() {
            const key = getStorageKey();
            chats = key ? JSON.parse(localStorage.getItem(key)) || [] : [];
            renderHistory();
        }

        function saveChatsToLocal() {
            const key = getStorageKey();
            if (key) localStorage.setItem(key, JSON.stringify(chats));
        }

        function renderHistory() {
            const hl = document.getElementById('history');
            hl.innerHTML = "";
            if(!window.currentUser) return;

            chats.slice().reverse().forEach(c => {
                const d = document.createElement('div');
                d.className = "history-item";
                d.innerHTML = `
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</span>
                    <span class="delete-btn" onclick="deleteChat('${c.id}', event)">🗑️</span>
                `;
                d.onclick = () => loadChat(c.id);
                hl.appendChild(d);
            });
        }

        window.deleteChat = (id, event) => {
            event.stopPropagation();
            chats = chats.filter(c => c.id != id);
            saveChatsToLocal();
            if (currentChatId == id) startNewChat();
            renderHistory();
        };

        async function sendMessage(text) {
            if (!text.trim() || !window.currentUser) return;
            
            if (!currentChatId) {
                currentChatId = Date.now().toString();
                chats.push({ id: currentChatId, title: text.substring(0, 30), messages: [] });
            }

            document.getElementById('welcomeScreen').style.display = "none";
            document.getElementById('chatWindow').style.display = "flex";
            
            addMsgToUI(text, 'user-message');
            
            const c = chats.find(x => x.id === currentChatId);
            c.messages.push({ text, role: 'user' });
            
            // Simulação de resposta
            setTimeout(() => {
                const aiTxt = "Resposta da IA Escupt";
                addMsgToUI(aiTxt, 'ai-message');
                c.messages.push({ text: aiTxt, role: 'ai' });
                saveChatsToLocal();
                renderHistory();
            }, 1000);
            
            saveChatsToLocal();
            renderHistory();
        }

        function addMsgToUI(txt, cls) {
            const d = document.createElement('div');
            d.className = `message ${cls}`;
            d.innerHTML = marked.parse(txt);
            const cw = document.getElementById('chatWindow');
            cw.appendChild(d);
            cw.scrollTop = cw.scrollHeight;
        }

        function loadChat(id) {
            currentChatId = id;
            const c = chats.find(x => x.id === id);
            document.getElementById('welcomeScreen').style.display = "none";
            const cw = document.getElementById('chatWindow');
            cw.style.display = "flex"; cw.innerHTML = "";
            c.messages.forEach(m => addMsgToUI(m.text, m.role === 'user' ? 'user-message' : 'ai-message'));
        }

        function startNewChat() {
            currentChatId = null;
            document.getElementById('chatWindow').innerHTML = "";
            document.getElementById('chatWindow').style.display = "none";
            document.getElementById('welcomeScreen').style.display = "block";
        }

        window.toggleThemeMenu = () => {
            const m = document.getElementById('theme-menu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        };

        window.setTheme = (t) => {
            document.body.setAttribute('data-theme', t);
            toggleThemeMenu();
        };

        window.openSidebar = () => { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display='block'; };
        window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; };

        document.getElementById('userInput').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') { sendMessage(e.target.value); e.target.value = ""; } 
        });
    </script>
</body>
</html>
